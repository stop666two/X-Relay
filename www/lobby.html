<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X-Relay · 大厅</title>
  <style>
    :root { --bg:#0f172a; --bg2:#1a2332; --bg3:#243044; --fg:#e2e8f0; --fg2:#94a3b8; --fg3:#64748b; --accent:#14b8a6; --accent2:#0d9488; --border:#334155; --red:#ef4444; --green:#22c55e; --amber:#f59e0b; --radius:10px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--fg); font:14px "SF Mono","Cascadia Code","JetBrains Mono",Consolas,"Microsoft YaHei",sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:40px 16px 80px; }
    .lobby { max-width:640px; width:100%; }
    .lobby h1 { font-size:28px; color:var(--accent); text-align:center; margin-bottom:6px; }
    .lobby .sub { text-align:center; color:var(--fg3); margin-bottom:24px; font-size:13px; }
    .toolbar { display:flex; gap:8px; margin-bottom:20px; justify-content:center; }
    .toolbar button { background:var(--bg2); color:var(--accent); border:1px solid var(--border); padding:8px 18px; border-radius:8px; cursor:pointer; font:inherit; font-size:13px; font-weight:600; transition:all .15s; }
    .toolbar button:hover { background:var(--bg3); border-color:var(--accent); }
    .toolbar button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .room-list { display:flex; flex-direction:column; gap:8px; }
    .room-card { display:flex; align-items:center; gap:12px; padding:14px 18px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); cursor:pointer; transition:all .15s; text-decoration:none; color:inherit; }
    .room-card:hover { border-color:var(--accent); background:var(--bg3); }
    .room-card .icon { font-size:20px; flex-shrink:0; }
    .room-card .info { flex:1; min-width:0; }
    .room-card .name { font-size:15px; font-weight:600; }
    .room-card .meta { font-size:12px; color:var(--fg2); margin-top:2px; }
    .room-card .badge { padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600; flex-shrink:0; }
    .badge.on { background:var(--green); color:#fff; }
    .badge.off { background:var(--fg3); color:#fff; }
    .room-card .actions { display:flex; gap:4px; flex-shrink:0; }
    .room-card .btn-copy,.room-card .btn-delete { background:none; border:none; cursor:pointer; font-size:14px; padding:4px 6px; border-radius:4px; opacity:.6; transition:all .15s; }
    .room-card .btn-copy:hover { opacity:1; background:var(--bg3); }
    .room-card .btn-delete:hover { opacity:1; background:var(--bg3); color:var(--red); }
    .empty { text-align:center; padding:40px; color:var(--fg3); }
    .empty svg { width:48px; height:48px; margin-bottom:12px; opacity:.3; }
    .public-room { margin-top:16px; padding:14px 18px; background:var(--bg2); border:1px dashed var(--border); border-radius:var(--radius); text-align:center; }
    .public-room a { color:var(--accent); text-decoration:none; font-weight:600; }
    .public-room a:hover { text-decoration:underline; }
    .footer-links { text-align:center; margin-top:24px; font-size:12px; color:var(--fg3); }
    .footer-links a { color:var(--accent); text-decoration:none; margin:0 8px; }
    .footer-links a:hover { text-decoration:underline; }
    .toast { position:fixed; top:16px; right:16px; background:var(--accent); color:#fff; padding:8px 18px; border-radius:6px; font-size:13px; z-index:9999; opacity:0; transform:translateY(-8px); transition:all .2s; pointer-events:none; }
    .toast.on { opacity:1; transform:translateY(0); }
    /* Dialog */
    .dialog-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:1000; display:none; align-items:center; justify-content:center; }
    .dialog-overlay.show { display:flex; }
    .dialog { background:var(--bg2); border-radius:var(--radius); padding:24px; width:400px; max-width:92vw; border:1px solid var(--border); }
    .dialog h3 { font-size:18px; margin-bottom:16px; color:var(--accent); }
    .dialog label { display:block; font-size:12px; color:var(--fg2); margin-bottom:4px; margin-top:12px; }
    .dialog label:first-of-type { margin-top:0; }
    .dialog input[type="text"],.dialog input[type="password"] { width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:6px; background:var(--bg); color:var(--fg); font:inherit; font-size:14px; outline:none; }
    .dialog input:focus { border-color:var(--accent); }
    .dialog .hint { font-size:11px; color:var(--fg3); margin-top:2px; }
    .dialog .checkbox-row { display:flex; align-items:center; gap:8px; margin-top:12px; font-size:13px; cursor:pointer; }
    .dialog .checkbox-row input { accent-color:var(--accent); }
    .dialog .actions { display:flex; justify-content:flex-end; gap:8px; margin-top:20px; }
    .dialog .actions button { padding:8px 20px; border-radius:6px; border:1px solid var(--border); cursor:pointer; font:inherit; font-size:13px; font-weight:600; }
    .dialog .btn-cancel { background:var(--bg); color:var(--fg); }
    .dialog .btn-submit { background:var(--accent); color:#fff; border-color:var(--accent); }
    .dialog .btn-danger { background:var(--red); color:#fff; border-color:var(--red); }
    .share-box { display:flex; gap:8px; margin-top:8px; }
    .share-box input { flex:1; }
    .share-box button { background:var(--accent); color:#fff; border:none; padding:6px 14px; border-radius:6px; cursor:pointer; font:inherit; font-size:13px; white-space:nowrap; }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <div class="lobby">
    <h1>X-Relay</h1>
    <p class="sub">局域网 P2P 文字/文件传输</p>
    <div class="toolbar">
      <button onclick="loadRooms()">🔄 刷新</button>
      <button class="primary" onclick="showCreateDlg()">＋ 创建房间</button>
    </div>
    <div class="room-list" id="roomList"></div>
    <div class="public-room">
      或直接进入 <a href="/chat">公共频道</a>（无需密码）
    </div>
    <div class="footer-links">
      <a href="https://github.com/stop666two/X-Relay" target="_blank" rel="noopener noreferrer">⭐ GitHub</a>
    </div>
  </div>

  <!-- Create room dialog -->
  <div class="dialog-overlay" id="createDlg">
    <div class="dialog">
      <h3>创建新房间</h3>
      <label>房间名称 *</label>
      <input type="text" id="roomName" maxlength="32" placeholder="给房间取个名字" autocomplete="off">
      <label>房间密码（可选）</label>
      <input type="password" id="roomPwd" placeholder="留空则不加密" autocomplete="off">
      <div class="hint">设置密码后，进入房间需输入密码，消息内容端到端加密</div>
      <label>删除密码 *</label>
      <input type="password" id="delPwd" placeholder="用于完全删除此房间" autocomplete="off">
      <div class="hint">分享此密码给管理员即可删除房间所有数据</div>
      <div class="checkbox-row"><input type="checkbox" id="roomVisible" checked> <span>在房间大厅中展示</span></div>
      <div class="actions">
        <button class="btn-cancel" onclick="hideCreateDlg()">取消</button>
        <button class="btn-submit" onclick="doCreate()">创建</button>
      </div>
    </div>
  </div>

  <!-- Delete room dialog -->
  <div class="dialog-overlay" id="deleteDlg">
    <div class="dialog">
      <h3>删除房间</h3>
      <p style="font-size:13px;color:var(--fg2);margin-bottom:12px">正在删除: <strong id="delRoomName" style="color:var(--fg)"></strong></p>
      <p style="font-size:12px;color:var(--amber);margin-bottom:12px">⚠️ 此操作不可逆，将删除房间内所有消息数据</p>
      <label>删除密码</label>
      <input type="password" id="delPwdInput" placeholder="输入此房间的删除密码" autocomplete="off">
      <div class="actions">
        <button class="btn-cancel" onclick="hideDeleteDlg()">取消</button>
        <button class="btn-danger" onclick="doDelete()">确认删除</button>
      </div>
    </div>
  </div>

  <!-- Share dialog -->
  <div class="dialog-overlay" id="shareDlg">
    <div class="dialog">
      <h3>分享房间链接</h3>
      <label>链接</label>
      <div class="share-box"><input type="text" id="shareLink" readonly><button onclick="copyShare()">复制</button></div>
      <div class="hint" id="shareHint"></div>
      <div class="actions"><button class="btn-submit" onclick="hideShareDlg()">关闭</button></div>
    </div>
  </div>

  <script>
    let _currentDelRoom = null;

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('on');
      setTimeout(() => t.classList.remove('on'), 2000);
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    async function loadRooms() {
      const list = document.getElementById('roomList');
      list.innerHTML = '<div class="empty">加载中…</div>';
      try {
        const res = await fetch('/api/rooms');
        const rooms = await res.json();
        if (!rooms.length) {
          list.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg><div>暂无活跃房间<br><span style="font-size:12px;color:var(--fg3)">点击"创建房间"开始使用</span></div></div>';
          return;
        }
        list.innerHTML = rooms.map(r => `
          <a class="room-card" href="/${r.id}">
            <span class="icon">${r.encrypted ? '🔒' : '🌐'}</span>
            <div class="info">
              <div class="name">${esc(r.name)}</div>
              <div class="meta">${r.encrypted ? '加密 · ' : '公开 · '}${r.online} 人在线</div>
            </div>
            <span class="badge ${r.online?'on':'off'}">${r.online ? r.online+' 在线' : '空'}</span>
            <span class="actions">
              <button class="btn-copy" title="分享链接" data-room-id="${r.id}" data-room-name="${esc(r.name)}" data-room-encrypted="${r.encrypted}">🔗</button>
              <button class="btn-delete" title="删除房间" data-room-id="${r.id}" data-room-name="${esc(r.name)}">🗑️</button>
            </span>
          </a>
        `).join('');
      } catch(e) {
        list.innerHTML = '<div class="empty">无法加载房间列表</div>';
      }
    }

    function showCreateDlg() { document.getElementById('createDlg').classList.add('show'); document.getElementById('roomName').focus(); }
    function hideCreateDlg() { document.getElementById('createDlg').classList.remove('show'); }

    async function sha256(s) { const h = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)); return [...new Uint8Array(h)].map(b => b.toString(16).padStart(2, '0')).join(''); }

    async function doCreate() {
      const name = document.getElementById('roomName').value.trim();
      const pwdRaw = document.getElementById('roomPwd').value.trim();
      const delPwd = document.getElementById('delPwd').value.trim();
      const visible = document.getElementById('roomVisible').checked;
      if (!name) { toast('请输入房间名称'); return; }
      if (!delPwd) { toast('请设置删除密码'); return; }
      const pwd = pwdRaw ? await sha256(pwdRaw) : '';
      try {
        const res = await fetch('/api/rooms', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ name, password: pwd, deletionPassword: delPwd, visibleInLobby: visible })
        });
        if (res.ok) {
          const data = await res.json();
          hideCreateDlg();
          toast('房间已创建，正在进入…');
          setTimeout(() => location.href = '/' + data.roomKey, 800);
        } else {
          const err = await res.json();
          toast('创建失败: ' + (err.error || '未知错误'));
        }
      } catch(e) { toast('创建失败'); }
    }

    function showDelete(roomId, name) {
      _currentDelRoom = roomId;
      document.getElementById('delRoomName').textContent = name;
      document.getElementById('deleteDlg').classList.add('show');
      document.getElementById('delPwdInput').value = '';
      document.getElementById('delPwdInput').focus();
    }
    function hideDeleteDlg() { document.getElementById('deleteDlg').classList.remove('show'); _currentDelRoom = null; }

    async function doDelete() {
      if (!_currentDelRoom) return;
      const pwd = document.getElementById('delPwdInput').value.trim();
      if (!pwd) { toast('请输入删除密码'); return; }
      try {
        const res = await fetch('/api/rooms/' + _currentDelRoom, {
          method: 'DELETE', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ deletionPassword: pwd })
        });
        if (res.ok) {
          hideDeleteDlg(); loadRooms(); toast('房间已删除');
        } else {
          toast('删除密码错误');
        }
      } catch(e) { toast('删除失败'); }
    }

    function showShare(roomId, name, encrypted) {
      document.getElementById('shareDlg').classList.add('show');
      if (encrypted) {
        document.getElementById('shareLink').value = `${location.origin}/${roomId}`;
        document.getElementById('shareHint').textContent = '加密房间需告知对方密码';
      } else {
        document.getElementById('shareLink').value = `${location.origin}/${roomId}`;
        document.getElementById('shareHint').textContent = '公开房间，无需密码即可加入';
      }
    }
    function hideShareDlg() { document.getElementById('shareDlg').classList.remove('show'); }
    function copyShare() {
      const link = document.getElementById('shareLink');
      link.select();
      navigator.clipboard?.writeText(link.value).then(() => toast('链接已复制')).catch(() => toast('复制失败'));
    }

    // Close dialogs on overlay click
    document.querySelectorAll('.dialog-overlay').forEach(o => o.addEventListener('click', e => { if (e.target === o) o.classList.remove('show'); }));
    // Close on Escape
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { hideCreateDlg(); hideDeleteDlg(); hideShareDlg(); } });

    loadRooms();
    const pollTimer = setInterval(loadRooms, 15000);
    window.addEventListener('beforeunload', () => clearInterval(pollTimer));

    // Event delegation for room card buttons
    document.getElementById('roomList').addEventListener('click', e => {
      const btnCopy = e.target.closest('.btn-copy');
      const btnDelete = e.target.closest('.btn-delete');
      if (btnCopy) {
        e.preventDefault();
        e.stopPropagation();
        showShare(btnCopy.dataset.roomId, btnCopy.dataset.roomName, btnCopy.dataset.roomEncrypted === 'true');
      } else if (btnDelete) {
        e.preventDefault();
        e.stopPropagation();
        showDelete(btnDelete.dataset.roomId, btnDelete.dataset.roomName);
      }
    });
  </script>
</body>
</html>
