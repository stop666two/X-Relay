<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>X-Relay</title>
  <script src="./i18n.js"></script>
  <script src="./xchatuser.js?v=33"></script>
  <link rel="stylesheet" href="./style.css?v=33">
</head>
<body>
  <div class="snackbar" id="snackbar"><span id="snackMsg"></span><span class="snackbar-action" id="snackAction"></span></div>

  <main class="main" id="main">
    <header class="room-header">
      <span class="room-name" id="roomName">X-Relay</span>
      <span class="room-meta" id="roomMeta"></span>
      <a class="btn-icon" id="btnHome" href="/" title="返回大厅"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
      <button class="btn-icon" id="btnShare" title="分享房间" style="display:none"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg></button>
      <button class="btn-icon" id="btnDeleteRoom" title="删除房间" style="display:none"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
      <button class="btn-icon" id="btnSearch" title="搜索 (Ctrl+K)"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
      <button class="btn-icon" id="btnSound" title="消息提示音"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 22c1.1 0 2-.9 2-2h-4a2 2 0 002 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg></button>
    </header>

    <div class="msgs" id="msgs"></div>
    <button class="scroll-fab" id="scrollFab" title="回到底部"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg><span class="badge" id="unreadBadge" style="display:none">0</span></button>

    <div class="typing-bar" id="typingBar"></div>

    <div class="input-area">
      <div class="input-row">
        <button class="btn-icon" id="btnEmoji" title="表情"><svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="8" cy="10" r="1" fill="currentColor"/><circle cx="16" cy="10" r="1" fill="currentColor"/><path d="M8 14c1.5 2 4.5 2 6 0" fill="none" stroke="currentColor" stroke-width="1.5"/></svg></button>
        <button class="btn-icon" id="btnFile" title="发送文件"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zM6 20V4h7v5h5v11H6z"/></svg></button>
        <textarea id="msgInput" rows="1" placeholder="输入消息… (Enter 发送, Shift+Enter 换行)"></textarea>
        <button class="btn-icon" id="btnSend" title="发送"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg></button>
      </div>
      <div class="emoji-picker" id="emojiPicker"></div>
    </div>
  </main>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title" id="sidebarTitle">在线</span>
      <div>
        <button class="btn-icon" id="btnTheme" title="主题"><svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.39 5.39 0 01-4.4 2.26 5.4 5.4 0 01-5.4-5.4c0-1.81.89-3.42 2.26-4.4A9 9 0 0012 3z"/></svg></button>
        <button class="btn-icon" id="btnNick" title="昵称"><svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 4a4 4 0 014 4 4 4 0 01-4 4 4 4 0 01-4-4 4 4 0 014-4m0 10c4.42 0 8 1.79 8 4v2H4v-2c0-2.21 3.58-4 8-4z"/></svg></button>
        <button class="btn-icon" id="btnClear" title="清屏"><svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14V4zM6 7v12a2 2 0 002 2h8a2 2 0 002-2V7H6z"/></svg></button>
        <button class="btn-icon" id="btnExport" title="导出聊天"><svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg></button>
        <button class="btn-icon" id="btnClearMsgs" title="清空聊天记录" style="display:none"><svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM8 9h8v10H8V9zm7.5-5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
      </div>
    </div>
    <ul class="sidebar-list" id="userList"></ul>
  </aside>

  <div class="mobile-nav">
    <button class="btn-icon" id="btnUsersMob"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.03-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg></button>
    <button class="btn-icon" id="btnFileMob"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zM6 20V4h7v5h5v11H6z"/></svg></button>
    <button class="btn-icon" id="btnRoom"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg></button>
    <button class="btn-icon" id="btnExportMob"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg></button>
  </div>
  <div class="mobile-backdrop" id="mobileBackdrop"></div>

  <menu class="ctx-menu" id="ctxMenu"></menu>

  <!-- File send dialog -->
  <div class="dialog-overlay" id="sendDlg">
    <div class="dialog" style="min-width:380px">
      <h3>发送文件</h3>
      <div id="fileBatchInfo" style="margin-bottom:12px;font-size:13px;color:var(--md-sys-color-on-surface-variant)"></div>
      <div id="sendUserList" style="max-height:240px;overflow-y:auto"></div>
      <div class="progress-wrap" id="sendProgress" style="display:none">
        <div class="progress-label" id="progLabel"></div>
        <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
        <button class="btn-text" id="btnCancelXfer" style="margin-top:8px;color:var(--md-sys-color-error)">取消传输</button>
      </div>
      <div class="dialog-actions">
        <button class="btn-text" id="btnCancelSend">取消</button>
        <button class="btn-filled" id="btnConfirmSend">发送</button>
      </div>
    </div>
  </div>

  <!-- Nickname dialog -->
  <div class="dialog-overlay" id="nickDlg">
    <div class="dialog">
      <h3>设置昵称</h3>
      <input type="text" id="nickInput" maxlength="20" placeholder="你的昵称" autocomplete="off">
      <div class="dialog-actions">
        <button class="btn-text" id="btnCancelNick">取消</button>
        <button class="btn-filled" id="btnSaveNick">保存</button>
      </div>
    </div>
  </div>

  <!-- Password dialog -->
  <div class="dialog-overlay" id="pwdDlg">
    <div class="dialog">
      <h3>房间密码</h3>
      <input type="password" id="pwdInput" placeholder="输入密码" autocomplete="off">
      <div class="dialog-actions">
        <button class="btn-filled" id="btnSubmitPwd">进入</button>
      </div>
    </div>
  </div>

  <!-- Search bar -->
  <div class="dialog-overlay" id="searchDlg" style="align-items:flex-start;padding-top:80px">
    <div class="dialog" style="width:500px">
      <input type="text" id="searchInput" placeholder="搜索消息… (Esc 关闭, ↑↓ 导航)" autocomplete="off" style="margin-bottom:0">
      <div style="font-size:12px;color:var(--md-sys-color-on-surface-variant);margin-top:4px" id="searchCount"></div>
    </div>
  </div>

  <!-- Room manage dialog (share + delete) -->
  <div class="dialog-overlay" id="roomManageDlg">
    <div class="dialog">
      <h3>房间管理</h3>
      <label>分享链接</label>
      <div class="share-link-row"><input type="text" id="roomShareLink" readonly><button class="btn-filled" onclick="copyRoomLink()">复制</button></div>
      <div style="font-size:12px;color:var(--md-sys-color-on-surface-variant);margin-top:4px" id="roomShareHint"></div>
      <div class="dialog-actions" style="justify-content:space-between">
        <button class="btn-text" style="color:var(--md-sys-color-error)" onclick="hideDlg('roomManageDlg');showDeleteRoomDlg()">🗑️ 删除房间</button>
        <button class="btn-text" onclick="hideDlg('roomManageDlg')">关闭</button>
      </div>
    </div>
  </div>

  <!-- Delete room dialog -->
  <div class="dialog-overlay" id="deleteRoomDlg">
    <div class="dialog">
      <h3>删除房间</h3>
      <p style="font-size:13px;color:var(--md-sys-color-on-surface-variant);margin-bottom:12px">⚠️ 此操作不可逆，将删除房间内所有消息数据</p>
      <input type="password" id="delRoomPwdInput" placeholder="输入此房间的删除密码" autocomplete="off">
      <div class="dialog-actions">
        <button class="btn-text" onclick="hideDlg('deleteRoomDlg')">取消</button>
        <button class="btn-filled" style="background:var(--md-sys-color-error);color:#fff" onclick="doDeleteRoom()">确认删除</button>
      </div>
    </div>
  </div>

  <script src="./index.js?v=33"></script>
</body>
</html>
