# X-Relay — Cloudflare Worker 配置
# 一键部署: 点击 README 中的 Deploy 按钮

name = "x-relay"
main = "worker.js"
compatibility_date = "2025-06-26"

# 静态资源
[assets]
directory = "./www"

# D1 数据库 (部署后需手动创建: wrangler d1 create xrelay-db)
[[d1_databases]]
binding = "DB"
database_name = "xrelay-db"
database_id = "your-database-id"

# 可观测性
[observability]
enabled = true
